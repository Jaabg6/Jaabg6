<svg width="420" height="280" viewBox="0 0 420 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Javier Arcila stack widget</title>
  <desc id="desc">Current technology stack for Javier Arcila focused on Python, AI integration, automation, backend, and frontend delivery.</desc>
  <defs>
    <linearGradient id="card2" x1="0" y1="0" x2="420" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <style>
      .heading { fill: #F8FAFC; font: 700 22px 'Segoe UI', Arial, sans-serif; }
      .meta { fill: #94A3B8; font: 400 12px 'Segoe UI', Arial, sans-serif; }
      .chip { fill: #0F172A; stroke: #243041; }
      .chip-text { fill: #E5E7EB; font: 600 12px 'Segoe UI', Arial, sans-serif; }
      .foot { fill: #CBD5E1; font: 600 13px 'Segoe UI', Arial, sans-serif; }
    </style>
  </defs>

  <rect x="1" y="1" width="418" height="278" rx="22" fill="url(#card2)" stroke="#1F2937"/>
  <text x="28" y="42" class="heading">Current stack</text>
  <text x="28" y="62" class="meta">Curated from current work, not inferred only from public repos</text>

  <rect x="28" y="86" width="80" height="30" rx="15" class="chip"/>
  <text x="68" y="105" text-anchor="middle" class="chip-text">Python</text>

  <rect x="116" y="86" width="82" height="30" rx="15" class="chip"/>
  <text x="157" y="105" text-anchor="middle" class="chip-text">FastAPI</text>

  <rect x="206" y="86" width="70" height="30" rx="15" class="chip"/>
  <text x="241" y="105" text-anchor="middle" class="chip-text">AI</text>

  <rect x="284" y="86" width="108" height="30" rx="15" class="chip"/>
  <text x="338" y="105" text-anchor="middle" class="chip-text">Automation</text>

  <rect x="28" y="126" width="76" height="30" rx="15" class="chip"/>
  <text x="66" y="145" text-anchor="middle" class="chip-text">Node.js</text>

  <rect x="112" y="126" width="92" height="30" rx="15" class="chip"/>
  <text x="158" y="145" text-anchor="middle" class="chip-text">Vue / Nuxt</text>

  <rect x="212" y="126" width="96" height="30" rx="15" class="chip"/>
  <text x="260" y="145" text-anchor="middle" class="chip-text">Tailwind</text>

  <rect x="316" y="126" width="76" height="30" rx="15" class="chip"/>
  <text x="354" y="145" text-anchor="middle" class="chip-text">Docker</text>

  <rect x="28" y="166" width="92" height="30" rx="15" class="chip"/>
  <text x="74" y="185" text-anchor="middle" class="chip-text">MongoDB</text>

  <rect x="128" y="166" width="72" height="30" rx="15" class="chip"/>
  <text x="164" y="185" text-anchor="middle" class="chip-text">MySQL</text>

  <rect x="208" y="166" width="102" height="30" rx="15" class="chip"/>
  <text x="259" y="185" text-anchor="middle" class="chip-text">REST APIs</text>

  <rect x="318" y="166" width="74" height="30" rx="15" class="chip"/>
  <text x="355" y="185" text-anchor="middle" class="chip-text">GitHub</text>

  <text x="28" y="232" class="foot">Public repo trend: Vue-heavy history.</text>
  <text x="28" y="252" class="foot">Current delivery focus: Python + AI + automation.</text>
</svg>
